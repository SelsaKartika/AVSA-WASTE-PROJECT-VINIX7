<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Registrasi - AVSA Waste</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            font-size: 16px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #DFF9E8;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 16px;
        }

        .container {
            width: 100%;
            max-width: 480px;
            padding-top: 20px;
        }

        .auth-screen {
            background-color: #DFF9E8;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .back-btn {
            background: none;
            border: none;
            color: #16A34A;
            font-size: 14px;
            cursor: pointer;
            margin-bottom: 24px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
            padding: 8px 0;
            font-weight: 500;
            touch-action: manipulation;
        }

        .back-btn:active {
            opacity: 0.7;
        }

        .auth-header {
            margin-bottom: 32px;
        }

        .auth-title {
            font-size: clamp(22px, 6vw, 26px);
            font-weight: 700;
            color: #7B7B7B;
            margin-bottom: 8px;
        }

        .auth-subtitle {
            font-size: 14px;
            color: #7B7B7B;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #333;
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 16px;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            background-color: white;
            transition: all 0.3s ease;
            -webkit-appearance: none;
        }

        .form-input:focus {
            outline: none;
            border-color: #16A34A;
            box-shadow: 0 0 0 3px rgba(22, 163, 74, 0.1);
        }

        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            text-align: center;
            touch-action: manipulation;
            -webkit-appearance: none;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-green {
            background-color: #22C55E;
            color: white;
            box-shadow: 0 4px 15px rgba(34, 197, 94, 0.3);
        }

        .btn-green:hover {
            background-color: #16A34A;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(34, 197, 94, 0.4);
        }

        .auth-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #7B7B7B;
        }

        .auth-footer a {
            color: #16A34A;
            font-weight: 600;
            text-decoration: none;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 28px 0;
            color: #7B7B7B;
            font-size: 13px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background-color: #ccc;
            margin: 0 12px;
        }

        .social-login {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .social-btn {
            flex: 1;
            padding: 14px;
            border: 1px solid #16A34A;
            border-radius: 12px;
            background-color: white;
            color: #16A34A;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            touch-action: manipulation;
            -webkit-appearance: none;
        }

        .social-btn:active {
            transform: scale(0.98);
            background-color: #DFF9E8;
        }

        @media (min-width: 768px) {
            body {
                align-items: center;
            }
            .container {
                padding-top: 0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="auth-screen">
            <a href="login.html" class="back-btn">
                ← Kembali
            </a>
            
            <div class="auth-header">
                <h2 class="auth-title">Buat Akun Baru</h2>
                <p class="auth-subtitle">Gunakan nomor HP atau email untuk mendaftar</p>
            </div>
            
            <form action="#" method="POST" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label class="form-label">Nomor HP / Email</label>
                    <input type="text" class="form-input" placeholder="Masukkan nomor HP atau email" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-input" placeholder="Buat password" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Konfirmasi Password</label>
                    <input type="password" class="form-input" placeholder="Ulangi password" required>
                </div>
                
                <button type="submit" class="btn btn-green">Daftar</button>
            </form>
            
            <div class="auth-footer">
                Sudah punya akun? <a href="login.html">Masuk</a>
            </div>
            
            <div class="divider">atau daftar dengan</div>
            
            <div class="social-login">
                <button type="button" class="social-btn">
                    <span></span> Google
                </button>
                <button type="button" class="social-btn">
                    <span></span> Nomor HP
                </button>
            </div>
        </div>
    </div>

    <script>
        function handleRegister(event) {
            event.preventDefault();
            alert('Pendaftaran berhasil! Silakan login.');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
